# .github/workflows/origin_scraper.yml
#
# Runs origin_scraper.py on demand until confirmed stable,
# then add the schedule trigger below.
#
# Uses the same DB secrets as the original scraper — no new secrets needed.
# Completely independent of scraper.yml.

name: Origin Scraper

on:
  # Manual trigger only for now — add cron once confirmed stable
  workflow_dispatch:

  # Uncomment this block once you've confirmed a clean manual run:
  # schedule:
  #   - cron: "0,15,30,45 * * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 22      # 6 airports concurrent ~4-5 min expected, 22 is safe headroom

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests psycopg2-binary urllib3

      - name: Run origin scraper
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT:     ${{ secrets.DB_PORT }}
        run: python origin_scraper.py
