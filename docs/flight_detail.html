<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Details | Islamabad Flight Tracker</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase loads first (no defer), then our script -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="flight_detail.js" defer></script>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-F5WJZW6DMV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-F5WJZW6DMV');
</script>

<body>
  <header class="site-header">
    <div class="nav-container">
      <a href="index.html" class="logo">Islamabad Flight Tracker</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <h1>Flight Details</h1>

  <div id="flight-info">
    <p>Loading...</p>
  </div>

  <div id="snapshot-controls">
    <label>
      <input type="checkbox" id="toggle-all">
      Show all snapshots (including unchanged)
    </label>
    <span id="last-refreshed"></span>
  </div>

  <table id="snapshot-table">
    <thead>
      <tr>
        <th>Scraped At</th>
        <th>ST</th>
        <th>ET</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <footer class="site-footer">
    <p>© 2026 Islamabad Flight Tracker</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </footer>
</body>
</html>
